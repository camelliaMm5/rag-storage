<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能家居商城 - AI客服</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;overflow:hidden}
a{color:#38bdf8}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:#1e293b;border-right:1px solid rgba(148,163,184,0.1);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-header{padding:16px;border-bottom:1px solid rgba(148,163,184,0.1)}
.sidebar-header h2{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{font-size:0.7rem;color:#64748b;margin-top:4px}
.status .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.status .dot.on{background:#34d399}

.nav-item{padding:10px 16px;cursor:pointer;font-size:0.85rem;border-left:2px solid transparent;transition:0.15s;display:flex;align-items:center;gap:8px}
.nav-item:hover{background:rgba(148,163,184,0.06)}
.nav-item.active{border-left-color:#38bdf8;background:rgba(56,189,248,0.08);color:#38bdf8}
.nav-item .badge{background:#f87171;color:#fff;font-size:0.65rem;padding:1px 6px;border-radius:10px;margin-left:auto}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(148,163,184,0.1);font-size:0.75rem;color:#64748b;margin-top:auto}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}

/* Chat */
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px}
.msg{margin-bottom:14px;display:flex;gap:10px;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0}
.msg.user .avatar{background:#818cf8}
.msg.assistant .avatar{background:#38bdf8}
.msg .bubble{max-width:70%;padding:10px 14px;border-radius:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-size:0.85rem}
.msg.assistant .bubble{background:rgba(30,41,59,0.9);border:1px solid rgba(148,163,184,0.12)}
.msg.user .bubble{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff}
.msg .type-tag{display:inline-block;padding:1px 8px;border-radius:6px;font-size:0.65rem;font-weight:700;margin-bottom:4px}
.type-tag.faq{background:rgba(56,189,248,0.12);color:#38bdf8}
.type-tag.order{background:rgba(251,146,60,0.12);color:#fb923c}
.type-tag.logistics{background:rgba(52,211,153,0.12);color:#34d399}
.type-tag.after_sale{background:rgba(250,204,21,0.12);color:#facc15}
.type-tag.place_order{background:rgba(244,114,182,0.12);color:#f472b6}
.type-tag.greeting{background:rgba(167,139,250,0.12);color:#a78bfa}
.agent-progress{margin:8px 0;padding:8px 14px;border-radius:8px;background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.15);font-size:0.8rem;color:#94a3b8;display:flex;align-items:center;gap:8px}
.agent-progress .pdot{width:8px;height:8px;border-radius:50%;background:#38bdf8;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.chat-input-area{padding:12px 20px;border-top:1px solid rgba(148,163,184,0.1)}
.input-row{display:flex;gap:10px}
.input-row textarea{flex:1;padding:10px 14px;border-radius:10px;resize:none;min-height:40px;max-height:100px;border:1px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.6);color:#e2e8f0;font-size:0.85rem;font-family:inherit;outline:none}
.input-row textarea:focus{border-color:#38bdf8}
.btn-send{width:40px;height:40px;border-radius:10px;border:none;flex-shrink:0;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;font-size:1rem;cursor:pointer}
.btn-send:disabled{opacity:.5;cursor:not-allowed}

/* Shop */
.shop-header{padding:14px 20px;border-bottom:1px solid rgba(148,163,184,0.1);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap}
.cat-tab{padding:5px 14px;border-radius:16px;border:1px solid rgba(148,163,184,0.15);background:transparent;color:#94a3b8;font-size:0.8rem;cursor:pointer;transition:0.15s}
.cat-tab:hover,.cat-tab.active{border-color:#38bdf8;color:#38bdf8;background:rgba(56,189,248,0.06)}
.search-input{padding:6px 12px;border-radius:16px;border:1px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.6);color:#e2e8f0;font-size:0.8rem;outline:none;width:180px}
.search-input:focus{border-color:#38bdf8}
.product-grid{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;align-content:start}
.product-card{background:#1e293b;border-radius:12px;padding:14px;border:1px solid rgba(148,163,184,0.08);transition:0.15s;display:flex;flex-direction:column}
.product-card:hover{border-color:rgba(56,189,248,0.3);transform:translateY(-2px)}
.product-card .pname{font-size:0.9rem;font-weight:600;margin-bottom:4px}
.product-card .pdesc{font-size:0.75rem;color:#94a3b8;margin-bottom:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-card .pprice{font-size:1.1rem;font-weight:700;color:#f472b6}
.product-card .pstock{font-size:0.7rem;color:#64748b;margin-top:2px}
.product-card .pcat{font-size:0.65rem;color:#64748b}
.product-card .add-cart-btn{margin-top:8px;padding:6px;border-radius:8px;border:1px solid rgba(244,114,182,0.3);background:transparent;color:#f472b6;font-size:0.8rem;cursor:pointer;transition:0.15s;width:100%}
.product-card .add-cart-btn:hover{background:rgba(244,114,182,0.1)}
.product-card.off_sale{opacity:0.4;pointer-events:none}
.product-card .nostock{color:#f87171}

/* Lists */
.page-header{padding:14px 20px;border-bottom:1px solid rgba(148,163,184,0.1);font-size:1rem;font-weight:600}
.list-container{flex:1;overflow-y:auto;padding:16px 20px}
.list-item{background:#1e293b;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid rgba(148,163,184,0.08);display:flex;justify-content:space-between;align-items:center;gap:12px}
.list-item .info{flex:1}
.list-item .info .title{font-size:0.9rem;font-weight:600}
.list-item .info .sub{font-size:0.75rem;color:#94a3b8;margin-top:2px}
.list-item .info .price{font-size:0.9rem;color:#f472b6;font-weight:600;margin-top:2px}
.list-item .actions{display:flex;gap:8px;flex-shrink:0}
.btn-sm{padding:5px 12px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);background:transparent;color:#e2e8f0;font-size:0.75rem;cursor:pointer;transition:0.15s}
.btn-sm:hover{border-color:#38bdf8;color:#38bdf8}
.btn-sm.danger{color:#f87171;border-color:rgba(248,113,113,0.3)}
.btn-sm.danger:hover{background:rgba(248,113,113,0.1)}
.btn-sm.primary{background:#38bdf8;color:#0f172a;border:none;font-weight:600}
.btn-sm.primary:hover{opacity:0.85}
.status-badge{font-size:0.7rem;padding:2px 8px;border-radius:6px;font-weight:600}
.status-badge.pending{background:rgba(251,191,36,0.15);color:#fbbf24}
.status-badge.paid{background:rgba(52,211,153,0.15);color:#34d399}
.status-badge.cancelled{background:rgba(148,163,184,0.1);color:#94a3b8}
.status-badge.on_sale{background:rgba(52,211,153,0.15);color:#34d399}
.status-badge.off_sale{background:rgba(148,163,184,0.1);color:#94a3b8}
.empty-state{text-align:center;padding:60px 0;color:#64748b}
.empty-state .icon{font-size:3rem;margin-bottom:12px}

.quant-ctrl{display:flex;align-items:center;gap:6px}
.quant-ctrl button{width:24px;height:24px;border-radius:6px;border:1px solid rgba(148,163,184,0.2);background:transparent;color:#e2e8f0;cursor:pointer;font-size:0.8rem}
.quant-ctrl span{font-size:0.85rem;min-width:20px;text-align:center}
.total-bar{padding:14px 20px;border-top:1px solid rgba(148,163,184,0.1);display:flex;justify-content:space-between;align-items:center}
.total-bar .amount{font-size:1.1rem;font-weight:700;color:#f472b6}
.btn-lg{padding:10px 24px;border-radius:10px;border:none;font-size:0.9rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff}
.btn-lg:disabled{opacity:.5;cursor:not-allowed}

@media(max-width:760px){
  .sidebar{display:none}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <h2>智能家居商城</h2>
    <div class="status"><span class="dot on" id="statusDot"></span><span id="statusText">连接中...</span></div>
    <div id="loginArea" style="margin-top:10px">
      <input id="loginEmail" placeholder="邮箱" value="zhangsan@shop.local" style="width:100%;padding:7px 10px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.6);color:#e2e8f0;font-size:0.78rem;outline:none;margin-bottom:4px">
      <input id="loginPass" placeholder="密码" type="password" value="user123" style="width:100%;padding:7px 10px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);background:rgba(15,23,42,0.6);color:#e2e8f0;font-size:0.78rem;outline:none;margin-bottom:4px">
      <div style="display:flex;gap:4px">
        <button onclick="doLogin()" style="flex:1;padding:7px;border-radius:8px;border:none;background:#38bdf8;color:#0f172a;font-size:0.8rem;cursor:pointer;font-weight:600">登录</button>
        <button onclick="doRegister()" style="flex:1;padding:7px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);background:transparent;color:#94a3b8;font-size:0.8rem;cursor:pointer">注册</button>
      </div>
    </div>
    <div id="userInfoArea" style="margin-top:8px;display:none">
      <div style="font-size:0.85rem;color:#38bdf8;font-weight:600" id="userDisplay"></div>
      <div style="font-size:0.7rem;color:#64748b" id="roleDisplay"></div>
      <button onclick="doLogout()" style="margin-top:6px;padding:4px 12px;border-radius:6px;border:1px solid rgba(248,113,113,0.3);background:transparent;color:#f87171;font-size:0.7rem;cursor:pointer">退出</button>
    </div>
  </div>

  <div class="nav-item active" data-panel="chat" onclick="switchPanel('chat')"><span>&#129302;</span> AI 客服</div>
  <div class="nav-item" data-panel="shop" onclick="switchPanel('shop')"><span>&#128722;</span> 商品浏览</div>
  <div class="nav-item" data-panel="cart" onclick="switchPanel('cart')"><span>&#128717;</span> 购物车 <span class="badge" id="cartBadge" style="display:none">0</span></div>
  <div class="nav-item" data-panel="orders" onclick="switchPanel('orders')"><span>&#128196;</span> 我的订单</div>
  <div class="nav-item" data-panel="aftersale" onclick="switchPanel('aftersale')"><span>&#128220;</span> 售后记录</div>
  <div class="nav-item admin-only" data-panel="admin" onclick="switchPanel('admin')" style="display:none"><span>&#128736;</span> 管理后台</div>

  <div class="sidebar-footer">v2.0 Demo | AI + Shop</div>
</div>

<!-- Main -->
<div class="main">
  <!-- Chat -->
  <div class="panel active" id="panel-chat">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state"><div class="icon">&#129302;</div><div>登录后开始对话 —— 可查询订单、物流、售后，或直接下单</div></div>
    </div>
    <div class="chat-input-area">
      <div class="input-row">
        <textarea id="inputEl" rows="1" placeholder="例如：我的订单1001到哪了？/ 我要买X1智能门锁 / 查物流1001" onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">&#8593;</button>
      </div>
    </div>
  </div>

  <!-- Shop -->
  <div class="panel" id="panel-shop">
    <div class="shop-header">
      <span style="font-weight:600;font-size:0.9rem">商品列表</span>
      <div class="cat-tabs" id="catTabs"></div>
      <input class="search-input" id="searchInput" placeholder="搜索商品..." oninput="loadProducts()">
    </div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- Cart -->
  <div class="panel" id="panel-cart">
    <div class="page-header">购物车</div>
    <div class="list-container" id="cartList"></div>
    <div class="total-bar" id="cartTotal" style="display:none">
      <span>合计: <span class="amount" id="cartAmount"></span></span>
      <button class="btn-lg" onclick="checkout()">结算下单</button>
    </div>
  </div>

  <!-- Orders -->
  <div class="panel" id="panel-orders">
    <div class="page-header">我的订单</div>
    <div class="list-container" id="orderList"></div>
  </div>

  <!-- AfterSale -->
  <div class="panel" id="panel-aftersale">
    <div class="page-header">售后记录</div>
    <div class="list-container" id="afterSaleList"></div>
  </div>

  <!-- Admin -->
  <div class="panel" id="panel-admin">
    <div class="page-header">管理后台</div>
    <div class="list-container" id="adminContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════ State ═══════════════════════════
let authToken = '';
let currentUser = null;
let currentPanel = 'chat';
let currentCategoryId = null;
let currentConvId = '';

function api(path, opts={}) {
  const headers = {...opts.headers};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  return fetch(path, {...opts, headers});
}

// ═══════════════════════════ Auth ═══════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (!email || !pass) { alert('请输入邮箱和密码'); return; }
  try {
    const r = await fetch('/api/shop/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if (d.code !== 0) { alert('登录失败: ' + (d.message || d.detail)); return; }
    authToken = d.data.access_token;
    currentUser = d.data.user;
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('userInfoArea').style.display = 'block';
    document.getElementById('userDisplay').textContent = currentUser.nickname || currentUser.email;
    document.getElementById('roleDisplay').textContent = currentUser.role === 'admin' ? '管理员' : '普通用户';
    if (currentUser.role === 'admin') {
      document.querySelectorAll('.admin-only').forEach(e => e.style.display = '');
    }
    await loadConversations();
    loadCartBadge();
  } catch(e) { alert('登录失败: ' + e.message); }
}

async function doRegister() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (!email || !pass) { alert('请输入邮箱和密码'); return; }
  if (pass.length < 6) { alert('密码至少6位'); return; }
  try {
    const r = await fetch('/api/shop/auth/register', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, password: pass, nickname: email.split('@')[0]})
    });
    const d = await r.json();
    if (d.code !== 0) { alert('注册失败: ' + (d.message || d.detail)); return; }
    alert('注册成功，请登录');
    document.getElementById('loginPass').value = '';
  } catch(e) { alert('注册失败: ' + e.message); }
}

function doLogout() {
  authToken = ''; currentUser = null; currentConvId = '';
  document.getElementById('loginArea').style.display = 'block';
  document.getElementById('userInfoArea').style.display = 'none';
  document.querySelectorAll('.admin-only').forEach(e => e.style.display = 'none');
  document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="icon">&#129302;</div><div>请先登录</div></div>';
}

// ═══════════════════════════ Panel ═══════════════════════════
function switchPanel(name) {
  if (!authToken && name !== 'chat') { alert('请先登录'); return; }
  currentPanel = name;
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  document.querySelector('.nav-item[data-panel="' + name + '"]')?.classList.add('active');
  document.querySelectorAll('.panel').forEach(e => e.classList.remove('active'));
  var p = document.getElementById('panel-' + name);
  if (p) p.classList.add('active');

  if (name === 'shop') loadCategories().then(() => loadProducts());
  if (name === 'cart') loadCart();
  if (name === 'orders') loadOrders();
  if (name === 'aftersale') loadAfterSales();
  if (name === 'admin') loadAdmin();
}

// ═══════════════════════════ Products ═══════════════════════════
async function loadCategories() {
  try {
    const r = await fetch('/api/shop/categories');
    const d = await r.json();
    const cats = d.data || [];
    let html = '<span class="cat-tab' + (currentCategoryId === null ? ' active' : '') + '" onclick="currentCategoryId=null;loadProducts()">全部</span>';
    cats.forEach(function(c) {
      if (c.children) c.children.forEach(function(sub) {
        html += '<span class="cat-tab' + (currentCategoryId === sub.id ? ' active' : '') + '" onclick="currentCategoryId=' + sub.id + ';loadProducts()">' + esc(sub.name) + '</span>';
      });
    });
    document.getElementById('catTabs').innerHTML = html;
  } catch(e) {}
}

async function loadProducts() {
  if (!authToken) { alert('请先登录'); return; }
  var kw = document.getElementById('searchInput')?.value || '';
  var url = '/api/shop/products?page=1&size=50';
  if (currentCategoryId) url += '&category_id=' + currentCategoryId;
  if (kw) url += '&keyword=' + encodeURIComponent(kw);
  try {
    const r = await api(url);
    const d = await r.json();
    const items = d.data?.items || [];
    var html = '';
    items.forEach(function(p) {
      var off = p.status !== 'on_sale' ? ' off_sale' : '';
      var noStock = p.stock <= 0 ? ' nostock' : '';
      html += '<div class="product-card' + off + '">'
        + '<div class="pcat">' + esc(p.category_name || '') + '</div>'
        + '<div class="pname">' + esc(p.name) + '</div>'
        + '<div class="pdesc">' + esc(p.description || '') + '</div>'
        + '<div class="pprice' + noStock + '">¥' + p.price + '</div>'
        + '<div class="pstock' + noStock + '">库存: ' + p.stock + '</div>'
        + '<button class="add-cart-btn" onclick="addToCart(' + p.id + ')" ' + (p.status !== 'on_sale' || p.stock <= 0 ? 'disabled' : '') + '>'
        + (p.stock <= 0 ? '缺货' : (p.status !== 'on_sale' ? '已下架' : '加入购物车'))
        + '</button></div>';
    });
    document.getElementById('productGrid').innerHTML = html || '<div class="empty-state"><div class="icon">&#128722;</div><div>暂无商品</div></div>';
  } catch(e) {}
}

// ═══════════════════════════ Cart ═══════════════════════════
async function addToCart(pid) {
  try {
    const r = await api('/api/shop/cart', {method:'POST', body:JSON.stringify({product_id:pid, quantity:1})});
    const d = await r.json();
    if (d.code === 0) { loadCartBadge(); alert('已加入购物车'); }
    else { alert(d.message || '操作失败'); }
  } catch(e) { alert('操作失败: ' + e.message); }
}

async function loadCart() {
  try {
    const r = await api('/api/shop/cart');
    const d = await r.json();
    const items = d.data?.items || [];
    const total = d.data?.total_amount || 0;
    var html = '';
    if (items.length === 0) {
      html = '<div class="empty-state"><div class="icon">&#128717;</div><div>购物车为空</div></div>';
    }
    items.forEach(function(it) {
      html += '<div class="list-item">'
        + '<div class="info"><div class="title">' + esc(it.product_name) + '</div><div class="price">¥' + it.price + ' x' + it.quantity + '</div></div>'
        + '<div class="quant-ctrl">'
        + '<button onclick="updateCartQty(' + it.product_id + ',' + (it.quantity - 1) + ')">-</button>'
        + '<span>' + it.quantity + '</span>'
        + '<button onclick="updateCartQty(' + it.product_id + ',' + (it.quantity + 1) + ')">+</button>'
        + '</div>'
        + '<button class="btn-sm danger" onclick="removeFromCart(' + it.product_id + ')">删除</button>'
        + '</div>';
    });
    document.getElementById('cartList').innerHTML = html;
    if (items.length > 0) {
      document.getElementById('cartTotal').style.display = 'flex';
      document.getElementById('cartAmount').textContent = '¥' + total.toFixed(2);
    } else {
      document.getElementById('cartTotal').style.display = 'none';
    }
    loadCartBadge();
  } catch(e) {}
}

async function updateCartQty(pid, qty) {
  if (qty <= 0) { removeFromCart(pid); return; }
  await api('/api/shop/cart/' + pid + '?quantity=' + qty, {method:'PUT'});
  loadCart();
}

async function removeFromCart(pid) {
  await api('/api/shop/cart/' + pid, {method:'DELETE'});
  loadCart();
}

async function loadCartBadge() {
  try {
    const r = await api('/api/shop/cart');
    const d = await r.json();
    const count = (d.data?.items || []).reduce(function(s, i) { return s + i.quantity; }, 0);
    const badge = document.getElementById('cartBadge');
    if (count > 0) { badge.style.display = ''; badge.textContent = count; }
    else { badge.style.display = 'none'; }
  } catch(e) {}
}

async function checkout() {
  if (!currentUser) return;
  var addr = prompt('请输入收货地址：', currentUser.role === 'user' ? '默认地址' : '');
  if (!addr) return;
  try {
    const r = await api('/api/shop/orders', {method:'POST', body:JSON.stringify({address: addr})});
    const d = await r.json();
    if (d.code === 0) { alert('下单成功！订单号: ' + d.data.id); loadCart(); switchPanel('orders'); }
    else { alert(d.message || '下单失败'); }
  } catch(e) { alert('下单失败: ' + e.message); }
}

// ═══════════════════════════ Orders ═══════════════════════════
async function loadOrders() {
  try {
    const r = await api('/api/shop/orders');
    const d = await r.json();
    const items = d.data?.items || [];
    if (items.length === 0) {
      document.getElementById('orderList').innerHTML = '<div class="empty-state"><div class="icon">&#128196;</div><div>暂无订单</div></div>';
      return;
    }
    var html = '';
    items.forEach(function(o) {
      html += '<div class="list-item">'
        + '<div class="info"><div class="title">订单 #' + o.id + ' <span class="status-badge ' + o.status + '">' + statusLabel(o.status) + '</span></div>'
        + '<div class="sub">' + timeStr(o.created_at) + '</div><div class="price">¥' + o.total_amount + '</div></div>'
        + '<div class="actions">'
        + (o.status === 'pending' ? '<button class="btn-sm primary" onclick="payOrder(' + o.id + ')">支付</button><button class="btn-sm danger" onclick="cancelOrder(' + o.id + ')">取消</button>' : '')
        + '<button class="btn-sm" onclick="viewOrder(' + o.id + ')">详情</button></div></div>';
    });
    document.getElementById('orderList').innerHTML = html;
  } catch(e) {}
}

async function payOrder(oid) {
  try {
    const r = await api('/api/shop/orders/' + oid + '/pay', {method:'POST'});
    const d = await r.json();
    if (d.code === 0) { alert('支付成功'); loadOrders(); }
    else { alert(d.message || '支付失败'); }
  } catch(e) { alert('支付失败: ' + e.message); }
}

async function cancelOrder(oid) {
  if (!confirm('确认取消该订单？')) return;
  try {
    const r = await api('/api/shop/orders/' + oid + '/cancel', {method:'POST'});
    const d = await r.json();
    if (d.code === 0) { alert('已取消'); loadOrders(); }
    else { alert(d.message || '取消失败'); }
  } catch(e) { alert('取消失败: ' + e.message); }
}

async function viewOrder(oid) {
  try {
    const r = await api('/api/shop/orders/' + oid);
    const d = await r.json();
    const o = d.data;
    var detail = '订单 #' + o.id + '\n状态: ' + statusLabel(o.status) + '\n金额: ¥' + o.total_amount + '\n地址: ' + o.address + '\n时间: ' + timeStr(o.created_at);
    if (o.items) {
      detail += '\n\n商品明细:';
      o.items.forEach(function(i) { detail += '\n  ' + i.product_name + ' x' + i.quantity + ' ¥' + i.price; });
    }
    alert(detail);
  } catch(e) {}
}

// ═══════════════════════════ AfterSale ═══════════════════════════
async function loadAfterSales() {
  try {
    const r = await api('/api/shop/after-sales');
    const d = await r.json();
    const items = d.data || [];
    if (items.length === 0) {
      document.getElementById('afterSaleList').innerHTML = '<div class="empty-state"><div class="icon">&#128220;</div><div>暂无售后记录</div></div>';

// ═══════════════════════════ Admin ═══════════════════════════
async function loadAdmin() {
  if (!currentUser || currentUser.role !== 'admin') {
    document.getElementById('adminContent').innerHTML = '<div class="empty-state"><div>仅管理员可访问</div></div>';

      html += '<div class="list-item"><div class="info"><div class="title">#' + o.id + ' | ' + esc(o.nickname) + ' <span class="status-badge ' + o.status + '">' + statusLabel(o.status) + '</span></div><div class="price">¥' + o.total_amount + '</div></div></div>';

async function toggleProduct(pid, newStatus) {
  try {
    const r = await api('/api/shop/admin/products/' + pid + '/status?status=' + newStatus, {method:'PUT'});
    const d = await r.json();
    if (d.code === 0) { loadAdmin(); } else { alert(d.message); }
  } catch(e) {}

// ═══════════════════════════ AI Chat ═══════════════════════════
async function loadConversations() {
  try {
    const r = await api('/api/conversations');
    const convs = await r.json();
    if (Array.isArray(convs) && convs.length > 0) {
      currentConvId = convs[0].conversation_id;
    }
  } catch(e) {}
}

async function newConversation() {
  try {
    const r = await api('/api/conversations', {method:'POST'});
    const d = await r.json();
    currentConvId = d.conversation_id;
    document.getElementById('chatMessages').innerHTML = '<div class="empty-state"><div class="icon">&#129302;</div><div>开始新对话</div></div>';
  } catch(e) {}
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const message = document.getElementById('inputEl').value.trim();
  if (!message) return;
  addBubble('user', message);
  document.getElementById('inputEl').value = '';
  document.getElementById('sendBtn').disabled = true;

  const chatMsgs = document.getElementById('chatMessages');
  const progressDiv = document.createElement('div');
  progressDiv.className = 'agent-progress';
  progressDiv.innerHTML = '<div class="pdot"></div><span>Supervisor 分析意图中...</span>';
  chatMsgs.appendChild(progressDiv);
  scrollDown();

  var currentRoute = '';

  try {
    const resp = await api('/api/chat/stream', {
      method:'POST',
      body:JSON.stringify({conversation_id: currentConvId, message: message})
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (var i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          handleSSE(evt, progressDiv);
          if (evt.event === 'routing') currentRoute = evt.route;
          if (evt.conversation_id && !currentConvId) currentConvId = evt.conversation_id;
        } catch(e) {}
      }
    }
    progressDiv.classList.add('done');
    progressDiv.querySelector('span').textContent = currentRoute ? '已完成 (' + routeLabel(currentRoute) + ')' : '已完成';
    progressDiv.querySelector('.pdot').style.animation = 'none';
    progressDiv.querySelector('.pdot').style.background = '#34d399';
  } catch(e) {
    progressDiv.remove();
    addBubble('assistant', '请求失败: ' + e.message);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inputEl').focus();
  }
}

function handleSSE(evt, progressDiv) {
  const span = progressDiv.querySelector('span');
  switch (evt.event) {
    case 'routing': span.innerHTML = '已路由到: ' + routeLabel(evt.route); break;
    case 'faq_agent': span.textContent = 'FAQ Agent 检索知识库中...'; break;
    case 'order_agent': span.textContent = '订单 Agent 查询中...'; break;
    case 'logistics_agent': span.textContent = '物流 Agent 查询中...'; break;
    case 'after_sale_agent': span.textContent = '售后 Agent 查询中...'; break;
    case 'place_order_agent': span.textContent = '下单 Agent 处理中...'; break;
    case 'finish': span.textContent = '生成回复中...'; break;
    case 'agent_result':
      if (evt.content) { addResultBubble(evt.content, evt.route || ''); progressDiv.remove(); }
      break;
    case 'error': progressDiv.remove(); addBubble('assistant', '出错: ' + (evt.message || '未知')); break;
  }
  scrollDown();
}

function addResultBubble(content, route) {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><span class="type-tag ' + (route || 'greeting') + '">' + routeLabel(route) + '</span><div>' + esc(content) + '</div></div>';
  document.getElementById('chatMessages').appendChild(div);
  scrollDown();
}

function addBubble(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="avatar">' + (role === 'user' ? '我' : 'AI') + '</div><div class="bubble">' + esc(content) + '</div>';
  document.getElementById('chatMessages').appendChild(div);
  scrollDown();
}

function scrollDown() {
  requestAnimationFrame(function() {
    const el = document.getElementById('chatMessages');
    if (el) el.scrollTop = el.scrollHeight;
  });
}

// ═══════════════════════════ Helpers ═══════════════════════════
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function statusLabel(s) {
  const m = {pending:'待支付', paid:'已支付', cancelled:'已取消', on_sale:'上架', off_sale:'下架',
             approved:'已通过', rejected:'已拒绝', completed:'已完成', picked_up:'已揽件', in_transit:'运输中',
             out_for_delivery:'派送中', delivered:'已签收'};
  return m[s] || s;
}
function routeLabel(r) {
  const m = {faq:'FAQ', order:'订单查询', logistics:'物流查询', after_sale:'售后查询', place_order:'下单', finish:'智能回复'};
  return m[r] || r;
}
function timeStr(t) { if (!t) return ''; return new Date(t).toLocaleString('zh-CN'); }
