<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服 Agent - 多智能体协同</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  width: 280px; min-width: 280px; background: #1e293b;
  border-right: 1px solid rgba(148,163,184,0.1); display: flex; flex-direction: column;
}
.sidebar-header { padding: 20px; border-bottom: 1px solid rgba(148,163,184,0.1); }
.sidebar-header h2 {
  font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #38bdf8, #818cf8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.sidebar-header .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.sidebar-header .status-dot.online { background: #34d399; }
.sidebar-header .status-dot.offline { background: #f87171; }
.sidebar-header .status-text { font-size: 0.75rem; color: #64748b; }
.btn-new {
  width: 100%; margin-top: 12px; padding: 10px; border-radius: 10px;
  border: 1px solid rgba(56,189,248,0.3); background: transparent;
  color: #38bdf8; font-size: 0.9rem; cursor: pointer; transition: 0.15s;
}
.btn-new:hover { background: rgba(56,189,248,0.1); }
.conv-list { flex: 1; overflow-y: auto; padding: 8px; }
.conv-item {
  padding: 12px 14px; border-radius: 10px; cursor: pointer; margin-bottom: 4px;
  transition: 0.15s; border: 1px solid transparent;
}
.conv-item:hover { background: rgba(148,163,184,0.06); }
.conv-item.active { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.2); }
.conv-item .title { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-item .meta { font-size: 0.7rem; color: #64748b; margin-top: 4px; }

/* ── Main chat ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header {
  padding: 14px 24px; border-bottom: 1px solid rgba(148,163,184,0.1);
  font-size: 0.85rem; color: #94a3b8; display: flex; align-items: center; gap: 8px;
}
.chat-messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
.chat-messages .empty {
  text-align: center; padding: 80px 0; color: #64748b;
}
.chat-messages .empty .icon { font-size: 3rem; margin-bottom: 16px; }

.msg { margin-bottom: 18px; display: flex; gap: 12px; animation: fadeIn 0.25s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.msg .avatar {
  width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
}
.msg.user .avatar { background: #818cf8; }
.msg.assistant .avatar { background: #38bdf8; }
.msg.assistant .bubble {
  max-width: 72%; padding: 14px 18px; border-radius: 14px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
  background: rgba(30,41,59,0.9); border: 1px solid rgba(148,163,184,0.12);
}
.msg.user .bubble {
  max-width: 72%; padding: 14px 18px; border-radius: 14px; line-height: 1.8;
  white-space: pre-wrap; word-break: break-word;
  background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff;
}

/* ── Agent progress indicator ── */
.agent-progress {
  margin: 12px 0; padding: 10px 16px; border-radius: 10px;
  background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.15);
  display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: #94a3b8;
}
.agent-progress .dot { width: 10px; height: 10px; border-radius: 50%; background: #38bdf8; animation: pulse 1s infinite; }
.agent-progress .route-tag {
  display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
  background: rgba(129,140,248,0.15); color: #818cf8; margin-left: auto;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
.agent-progress.done { opacity: 0.5; }
.agent-progress.done .dot { background: #34d399; animation: none; }

/* ── Message type variants ── */
.msg .bubble .type-tag {
  display: inline-block; padding: 2px 10px; border-radius: 8px;
  font-size: 0.7rem; font-weight: 700; margin-bottom: 6px;
}
.type-tag.faq { background: rgba(56,189,248,0.12); color: #38bdf8; }
.type-tag.order { background: rgba(251,146,60,0.12); color: #fb923c; }
.type-tag.logistics { background: rgba(52,211,153,0.12); color: #34d399; }
.type-tag.place_order { background: rgba(244,114,182,0.12); color: #f472b6; }
.type-tag.greeting { background: rgba(167,139,250,0.12); color: #a78bfa; }

/* ── Order success card ── */
.order-success {
  margin-top: 8px; padding: 14px; border-radius: 12px;
  background: rgba(244,114,182,0.06); border: 1px solid rgba(244,114,182,0.2);
}
.order-success .order-id {
  font-size: 1.1rem; font-weight: 700; color: #f472b6;
  font-family: monospace; letter-spacing: 0.05em;
}
.order-success .detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
  margin-top: 8px; font-size: 0.85rem;
}
.order-success .detail-grid .dl { color: #94a3b8; }
.order-success .detail-grid .dv { color: #e2e8f0; font-weight: 600; }

/* ── Order card ── */
.order-card {
  margin-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px;
  background: rgba(251,146,60,0.05); border-radius: 10px; padding: 12px; font-size: 0.85rem;
}
.order-card .label { color: #94a3b8; }
.order-card .value { color: #e2e8f0; font-weight: 600; }

/* ── Logistics timeline ── */
.logistics-timeline { margin-top: 8px; position: relative; }
.logistics-timeline .tl-item {
  display: flex; gap: 12px; padding: 5px 0; font-size: 0.82rem; align-items: baseline;
}
.logistics-timeline .tl-time { color: #94a3b8; min-width: 110px; flex-shrink: 0; }
.logistics-timeline .tl-dot {
  width: 10px; height: 10px; border-radius: 50%; background: #34d399; flex-shrink: 0; margin-top: 4px;
}
.logistics-timeline .tl-status { color: #e2e8f0; }
.logistics-timeline .tl-location { color: #64748b; font-size: 0.75rem; }

/* ── FAQ result ── */
.faq-result { margin-top: 6px; padding-left: 10px; border-left: 2px solid rgba(56,189,248,0.2); }

/* ── Input ── */
.chat-input-area { padding: 14px 24px; border-top: 1px solid rgba(148,163,184,0.1); }
.input-row { display: flex; gap: 12px; }
.input-row textarea {
  flex: 1; padding: 12px 16px; border-radius: 12px; resize: none; min-height: 44px; max-height: 120px;
  border: 1px solid rgba(148,163,184,0.2); background: rgba(15,23,42,0.6);
  color: #e2e8f0; font-size: 0.9rem; font-family: inherit; outline: none; transition: 0.15s;
}
.input-row textarea:focus { border-color: #38bdf8; }
.btn-send {
  width: 44px; height: 44px; border-radius: 12px; border: none; flex-shrink: 0;
  background: linear-gradient(135deg, #38bdf8, #818cf8); color: #fff;
  font-size: 1.2rem; cursor: pointer; transition: 0.15s; display: flex; align-items: center; justify-content: center;
}
.btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(56,189,248,0.3); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.quick-btn {
  padding: 5px 12px; border-radius: 16px; border: 1px solid rgba(148,163,184,0.15);
  background: transparent; color: #94a3b8; font-size: 0.75rem; cursor: pointer;
  transition: 0.15s;
}
.quick-btn:hover { border-color: rgba(56,189,248,0.3); color: #38bdf8; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  .msg .bubble { max-width: 88%; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>多智能体客服</h2>
    <div style="margin-top:6px">
      <span class="status-dot online" id="statusDot"></span>
      <span class="status-text" id="statusText">连接中...</span>
    </div>
    <button class="btn-new" onclick="newConversation()">＋ 新建会话</button>
  </div>
  <div class="conv-list" id="convList"></div>
</div>

<div class="main">
  <div class="chat-header" id="chatHeader">
    <span>FAQ · 订单 · 物流 — 三 Agent 协同</span>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="empty">
      <div class="icon">&#129302;</div>
      <div>我是智能客服，可以帮你查 FAQ、订单、物流</div>
    </div>
  </div>
  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="inputEl" rows="1" placeholder="输入问题，如：订单20240501001发货了吗？" onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">&#8593;</button>
    </div>
    <div style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap">
      <button class="quick-btn" onclick="quickOrder()">🛒 快速下单</button>
      <button class="quick-btn" onclick="inputEl.value='怎么退货';sendMessage()">📋 退货政策</button>
      <button class="quick-btn" onclick="inputEl.value='订单20240501001';sendMessage()">📦 查订单</button>
      <button class="quick-btn" onclick="inputEl.value='20240501001快递进度';sendMessage()">🚚 查物流</button>
    </div>
  </div>
</div>

<script>
const chatMessages = document.getElementById('chatMessages');
const chatHeader = document.getElementById('chatHeader');
const inputEl = document.getElementById('inputEl');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const convListEl = document.getElementById('convList');

let currentConvId = '';
let conversations = [];

// ── Init ──
(async () => {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    statusDot.className = 'status-dot online';
    statusText.textContent = `在线 · ${d.chunks} 条知识`;
  } catch(e) {
    statusDot.className = 'status-dot offline';
    statusText.textContent = '离线';
  }
  await loadConversations();
})();

// ── Conversations ──
async function loadConversations() {
  try {
    const r = await fetch('/api/conversations?user_id=default');
    conversations = await r.json();
    renderConvList();
  } catch(e) {}
}
function renderConvList() {
  convListEl.innerHTML = conversations.map(c => `
    <div class="conv-item ${c.conversation_id===currentConvId?'active':''}"
         onclick="switchConv('${c.conversation_id}')">
      <div class="title">${esc(c.title||'新会话')}</div>
      <div class="meta">${c.status} · ${(c.updated_at||'').slice(0,10)}</div>
    </div>`).join('');
}
async function newConversation() {
  try {
    const r = await fetch('/api/conversations', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:'default'})
    });
    const d = await r.json();
    currentConvId = d.conversation_id;
    chatMessages.innerHTML = '<div class="empty"><div class="icon">&#129302;</div><div>开始新的对话</div></div>';
    await loadConversations();
  } catch(e) {}
}
async function switchConv(convId) {
  currentConvId = convId; renderConvList();
  chatMessages.innerHTML = '<div class="empty"><div style="padding:20px">加载中...</div></div>';
  try {
    const r = await fetch(`/api/conversations/${convId}`);
    const d = await r.json();
    chatMessages.innerHTML = '';
    (d.messages||[]).forEach(m => addBubble(m.role, m.content, m.metadata));
  } catch(e) {
    chatMessages.innerHTML = '<div class="empty">加载失败</div>';
  }
  scrollDown();
}

// ── Chat with SSE streaming ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const message = inputEl.value.trim();
  if (!message) return;

  addBubble('user', message);
  inputEl.value = '';
  sendBtn.disabled = true;

  // ── Create progress indicator ──
  const progressDiv = document.createElement('div');
  progressDiv.className = 'agent-progress';
  progressDiv.id = 'progress-' + Date.now();
  progressDiv.innerHTML = '<div class="dot"></div><span>Supervisor 分析意图中...</span>';
  chatMessages.appendChild(progressDiv);
  scrollDown();

  // ── Create result bubble (filled incrementally) ──
  let resultBubble = null;
  let currentRoute = '';

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({conversation_id: currentConvId, message})
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));
          handleSSE(evt, progressDiv);
          if (evt.event === 'routing') currentRoute = evt.route;
          if (evt.conversation_id && !currentConvId) {
            currentConvId = evt.conversation_id;
            loadConversations();
          }
        } catch(e) {}
      }
    }

    // Mark progress done
    progressDiv.classList.add('done');
    progressDiv.querySelector('span').textContent =
      currentRoute ? `已完成 (${routeLabel(currentRoute)})` : '已完成';
    progressDiv.querySelector('.dot').style.animation = 'none';
    progressDiv.querySelector('.dot').style.background = '#34d399';

  } catch(e) {
    progressDiv.remove();
    addBubble('assistant', '请求失败: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function handleSSE(evt, progressDiv) {
  const event = evt.event;
  const node = evt.node || '';

  // Update progress text
  const span = progressDiv.querySelector('span');
  const routeTagHtml = evt.route ? `<span class="route-tag">${routeLabel(evt.route)}</span>` : '';

  switch (event) {
    case 'routing':
      span.innerHTML = `已路由到: ${routeLabel(evt.route)} ${routeTagHtml}`;
      break;
    case 'faq_agent':
      span.innerHTML = `FAQ Agent 检索知识库中... ${routeTagHtml}`;
      break;
    case 'order_agent':
      span.innerHTML = `订单 Agent 查询中... ${routeTagHtml}`;
      break;
    case 'logistics_agent':
      span.innerHTML = `物流 Agent 查询中... ${routeTagHtml}`;
      break;
    case 'place_order_agent':
      span.innerHTML = `下单 Agent 处理中... ${routeTagHtml}`;
      break;
    case 'finish':
      span.textContent = '生成回复中...';
      break;
    case 'agent_result':
      if (evt.content) {
        addResultBubble(evt.content, evt.route || '');
        progressDiv.remove();
      }
      break;
    case 'error':
      progressDiv.remove();
      addBubble('assistant', '处理出错: ' + (evt.message || '未知错误'));
      break;
    case 'done':
      // Clean up
      break;
  }
  scrollDown();
}

function addResultBubble(content, route) {
  const routeType = route || 'greeting';
  const tagLabel = routeLabel(routeType);
  const tagClass = routeType;

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.innerHTML = `
    <div class="avatar">AI</div>
    <div class="bubble">
      <span class="type-tag ${tagClass}">${tagLabel}</span>
      <div class="content-body">${formatContent(content, routeType)}</div>
    </div>`;
  chatMessages.appendChild(div);
  scrollDown();
}

function addBubble(role, content, metadata) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '我' : 'AI';
  let tagHtml = '';
  let formatted = esc(content||'');

  if (role === 'assistant' && metadata) {
    const route = metadata.route || '';
    if (route) {
      tagHtml = `<span class="type-tag ${route}">${routeLabel(route)}</span>`;
      formatted = formatContent(content, route);
    }
  }

  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${tagHtml}${formatted}</div>`;
  chatMessages.appendChild(div);
  scrollDown();
}

// ── Content formatting ──
function formatContent(text, route) {
  if (route === 'order') return formatOrder(text);
  if (route === 'logistics') return formatLogistics(text);
  if (route === 'place_order') return formatOrderSuccess(text);
  return esc(text||'');
}

function formatOrder(text) {
  const safe = esc(text||'');
  // Extract structured fields for card display
  const fields = [
    ['商品', /商品[：:]\s*(.+)/],
    ['金额', /金额[：:]\s*(.+)/],
    ['下单时间', /下单时间[：:]\s*(.+)/],
    ['收件人', /收件人[：:]\s*(.+)/],
    ['地址', /地址[：:]\s*(.+)/],
  ];
  let card = '<div class="order-card">';
  for (const [label, re] of fields) {
    const m = safe.match(re);
    if (m) card += `<div class="label">${label}</div><div class="value">${m[1]}</div>`;
  }
  card += '</div>';
  return card + '<div style="margin-top:8px">' + safe + '</div>';
}

function formatLogistics(text) {
  const safe = esc(text||'');
  // Extract timeline entries
  const tlRe = /(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})\s+(.+?)(?:\s*[（(](.+?)[）)])?\s*(?=\d{4}-|\n|$)/g;
  let tl = '<div class="logistics-timeline">';
  let match;
  let found = false;
  while ((match = tlRe.exec(safe)) !== null) {
    found = true;
    const [, time, status, loc] = match;
    tl += `<div class="tl-item">
      <span class="tl-time">${time}</span>
      <span class="tl-dot"></span>
      <span class="tl-status">${status}</span>
      ${loc ? `<span class="tl-location">${loc}</span>` : ''}
    </div>`;
  }
  tl += '</div>';
  if (found) return tl + '<div style="margin-top:8px">' + safe + '</div>';
  return safe;
}

function formatOrderSuccess(text) {
  const safe = esc(text||'');
  const oidMatch = safe.match(/订单号[：:]\\s*(\\d+)/);
  const orderId = oidMatch ? oidMatch[1] : '';
  const fields = [
    ['商品', /商品[：:]\s*(.+)/],
    ['金额', /金额[：:]\s*(.+)/],
    ['收件人', /收件人[：:]\s*(.+)/],
    ['地址', /地址[：:]\s*(.+)/],
    ['状态', /状态[：:]\s*(.+)/],
  ];
  let card = '<div class="order-success">';
  if (orderId) card += `<div class="order-id"># ${orderId}</div>`;
  card += '<div class="detail-grid">';
  for (const [label, re] of fields) {
    const m = safe.match(re);
    if (m) card += `<div class="dl">${label}</div><div class="dv">${m[1]}</div>`;
  }
  card += '</div></div>';
  return card + '<div style="margin-top:8px">' + safe + '</div>';
}

function routeLabel(route) {
  const m = {faq:'FAQ问答', order:'订单查询', logistics:'物流查询',
             place_order:'下单成功', finish:'智能回复', greeting:'智能回复'};
  return m[route] || route;
}

function quickOrder() {
  const p = prompt('快速下单\n请输入：商品名, 收件人, 地址, 金额(可选)', 'X1智能门锁, 张三, 广州市天河区体育西路100号, 1599');
  if (!p) return;
  const parts = p.split(',').map(s => s.trim());
  const msg = `我要买${parts[0]}，收件人${parts[1]}，地址${parts[2]}` + (parts[3] ? `，金额${parts[3]}元` : '');
  inputEl.value = msg;
  sendMessage();
}

function scrollDown() {
  requestAnimationFrame(() => { chatMessages.scrollTop = chatMessages.scrollHeight; });
}
function esc(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
